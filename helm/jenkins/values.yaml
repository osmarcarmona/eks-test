controller:
  image:
    tag: lts
  serviceType: ClusterIP
  servicePort: 8080

  persistence:
    enabled: true
    size: 8Gi
    storageClass: gp2

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - job-dsl:latest
    - configuration-as-code:latest

  JCasC:
    configScripts:
      pipeline-job: |
        jobs:
          - script: >
              pipelineJob('deploy-app') {
                definition {
                  cps {
                    script("""
                      pipeline {
                        agent {
                          kubernetes {
                            yaml '''
                              apiVersion: v1
                              kind: Pod
                              spec:
                                serviceAccountName: jenkins
                                containers:
                                  - name: helm
                                    image: alpine/helm:latest
                                    command: ["cat"]
                                    tty: true
                                  - name: kubectl
                                    image: bitnami/kubectl:latest
                                    command: ["cat"]
                                    tty: true
                            '''
                          }
                        }
                        stages {
                          stage('Deploy Backend') {
                            steps {
                              container('helm') {
                                sh 'helm upgrade --install backend ./helm/backend -n default -f helm/backend/values.yaml'
                              }
                              container('kubectl') {
                                sh 'kubectl rollout status deployment/backend -n default --timeout=120s'
                              }
                            }
                          }
                          stage('Deploy Frontend') {
                            steps {
                              container('helm') {
                                sh 'helm upgrade --install frontend ./helm/frontend -n default -f helm/frontend/values.yaml'
                              }
                              container('kubectl') {
                                sh 'kubectl rollout status deployment/frontend -n default --timeout=120s'
                              }
                            }
                          }
                        }
                      }
                    """.stripIndent())
                    sandbox(true)
                  }
                }
              }

  sidecars:
    configAutoReload:
      enabled: true

agent:
  enabled: true
  podTemplates:
    helm: |
      - name: helm
        label: helm
        containers:
          - name: helm
            image: alpine/helm:latest
            command: /bin/sh -c
            args: "cat"
            ttyEnabled: true
          - name: kubectl
            image: bitnami/kubectl:latest
            command: /bin/sh -c
            args: "cat"
            ttyEnabled: true
